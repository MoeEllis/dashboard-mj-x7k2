name: Dashboard aktualisieren

on:
  schedule:
    - cron: "*/30 * * * *"   # alle 30 Minuten
  workflow_dispatch:          # manueller Start (⟳-Knopf / "Run workflow")
  push:
    branches: [main]
    paths:
      - build_dashboard.py
      - .github/workflows/update.yml

permissions:
  contents: write

concurrency:
  group: dashboard-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests icalendar recurring-ical-events cryptography

      - name: Dashboard bauen und verschlüsseln
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
          TODOIST_TOKEN: ${{ secrets.TODOIST_TOKEN }}
          DASH_PASSWORD: ${{ secrets.DASH_PASSWORD }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python build_dashboard.py

      - name: Veröffentlichen (nur bei Änderung)
        run: |
          git config user.name "dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || (git commit -m "Dashboard aktualisiert ($(TZ=Europe/Berlin date +'%d.%m. %H:%M') Uhr)" && git push)
